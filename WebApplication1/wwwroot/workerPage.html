<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <title>Worker</title>
  <link rel="stylesheet" href="/css/login.css">
  <link rel="stylesheet" href="/css/worker.css">
</head>

<body onload="loadOrders()">
  <div class="page">

    <header class="site-header">
      <div class="header-left">
        <img src="/img/logohader.png" alt="logo" class="logo-img">
      </div>

      <div class="header-center">
        <div class="title-main">Відділ системного адміністрування</div>
        <div class="title-sub">Панель працівника</div>
      </div>
    </header>

    <main class="main worker-main">
      <div class="worker-card">

        <div class="worker-top">
          <div id="hello" class="hello-text"></div>

          <div class="top-actions">
            <button type="button" class="btn-secondary" onclick="logout()">Вийти</button>

            <a href="/create-order.html" class="action-link">
              <button type="button" class="btn-primary">Створити заявку</button>
            </a>
          </div>
        </div>

        <div class="worker-filter">
          <select id="status">
            <option value="">Усі статуси</option>
            <option value="NEW">Нова</option>
            <option value="ASSIGNED">Призначена</option>
            <option value="IN_PROGRESS">У роботі</option>
            <option value="INSPECTION">На перевірці</option>
            <option value="WAITING_DETAILS">Очікує деталей</option>
            <option value="EXECUTION">На виконанні</option>
            <option value="DONE">Виконана</option>
            <option value="CANCELED">Скасована</option>
          </select>

          <button type="button" class="btn-secondary" onclick="loadOrders()">Оновити</button>
        </div>

        <div class="orders-wrapper">
          <div class="orders-header">
            <div>Статус</div>
            <div>Тип заявки</div>
            <div>Опис проблеми</div>
            <div>Локація</div>
            <div>Спеціаліст</div>
            <div>Дата</div>
          </div>

          <div id="orders">
            <div class="empty">Завантаження...</div>
          </div>
        </div>

      </div>
    </main>

    <footer class="site-footer">
      © 2026 Support System
    </footer>
  </div>

  <script src="/js/js_workers/guard.js"></script>
  <script src="/js/js_workers/worker-utils.js"></script>
  <script src="/js/js_workers/worker-api.js"></script>
  <script src="/js/js_workers/worker-render.js"></script>
  <script src="/js/js_workers/worker-page.js"></script>
</body>
</html>
