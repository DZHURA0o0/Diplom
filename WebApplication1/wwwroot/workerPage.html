<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <title>Worker</title>

  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/header.css">
  <link rel="stylesheet" href="/css/worker.css">
  <link rel="stylesheet" href="/css/components.css">
  
</head>

<body>
  <div class="page">

    <header class="app-header">
      <div class="app-header-left">
        <img src="/img/logohader.png" alt="logo" class="app-logo">
      </div>

      <div class="app-header-center">
        <div class="app-title-main">Відділ системного адміністрування</div>
        <div class="app-title-sub">Сторінка подачі та перегляду власних заявок</div>
      </div>

      <div class="app-header-right">
        <div class="app-user-box">
          <div class="app-user-role" id="headerUserRole"></div>
          <div class="app-user-name" id="headerUserName"></div>
        </div>
      </div>
    </header>

    <main class="main worker-main">
      <div class="worker-card">

        <div class="worker-top">
          <div id="hello" class="hello-text"></div>

          <div class="top-actions">
            <button type="button" class="btn-secondary" onclick="logout()">
              Вийти
            </button>

            <a href="/create-order.html" class="action-link">
              <button type="button" class="btn-primary">
                Створити заявку
              </button>
            </a>
          </div>
        </div>

        <div class="worker-filter">
          <select id="status">
            <option value="">Усі статуси</option>
            <option value="NEW">Нова</option>
            <option value="ASSIGNED">Призначена</option>
            <option value="IN_PROGRESS">У роботі</option>
            <option value="INSPECTION">На перевірці</option>
            <option value="WAITING_DETAILS">Очікує деталей</option>
            <option value="DETAILS_RECEIVED">Деталі отримано</option>
            <option value="EXECUTION">На виконанні</option>
            <option value="UNDER_COMPLAINT">На оскарженні</option>
            <option value="REWORK">На переробці</option>
            <option value="REWORK_REVIEW">Переробку завершено</option>
            <option value="DONE">Виконана</option>
            <option value="CANCELED">Скасована</option>
          </select>

          <button type="button" class="btn-primary-2" onclick="loadOrders()">
            Оновити
          </button>
        </div>

        <div class="orders-wrapper">
          <div class="orders-header">
            <div>Статус</div>
            <div>Тип заявки</div>
            <div>Опис проблеми</div>
            <div>Локація</div>
            <div>Спеціаліст</div>
            <div>Дата</div>
          </div>

          <div id="orders">
            <div class="empty">Завантаження...</div>
          </div>
        </div>

      </div>
    </main>

    <footer class="site-footer">
      © 2026 Support System
    </footer>
  </div>

  <div id="workerComplaintModal" class="worker-complaint-modal hidden">
    <div class="worker-complaint-dialog">
      <div class="worker-complaint-head">
        <div>
          <div class="worker-complaint-title">Подати скаргу</div>
          <div class="worker-complaint-subtitle">
            Опиши, що саме було виконано неправильно або неякісно.
          </div>
        </div>

        <button
          type="button"
          class="worker-complaint-close"
          onclick="closeWorkerComplaintModal()"
        >
          ×
        </button>
      </div>

      <textarea
        id="workerComplaintText"
        class="worker-complaint-textarea"
        placeholder="Введіть текст скарги..."
      ></textarea>

      <div id="workerComplaintError" class="worker-complaint-error"></div>

      <div class="worker-complaint-actions">
        <button
          type="button"
          id="workerComplaintCancelBtn"
          class="btn-secondary"
        >
          Скасувати
        </button>

        <button
          type="button"
          id="workerComplaintSubmitBtn"
          class="btn-complaint"
        >
          Подати скаргу
        </button>
      </div>
    </div>
  </div>

  <script src="/js/guard.js"></script>
  <script src="/js/shared.js"></script>
  <script src="/js/js_workers/worker-api.js"></script>
  <script src="/js/js_workers/worker-render.js"></script>
  <script src="/js/js_workers/worker-page.js"></script>
  <script src="/js/js_workers/worker-complaint-modal.js"></script>
</body>
</html>
