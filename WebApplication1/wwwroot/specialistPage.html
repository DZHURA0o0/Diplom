<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <title>Specialist</title>
  <link rel="stylesheet" href="/css/login.css">
  <link rel="stylesheet" href="/css/header.css">
  <link rel="stylesheet" href="/css/specialist.css">
</head>

<body>
  <div class="page">

    <header class="app-header">
      <div class="app-header-left">
        <img src="/img/logohader.png" alt="logo" class="app-logo">
      </div>

      <div class="app-header-center">
        <div class="app-title-main">Відділ системного адміністрування</div>
        <div class="app-title-sub">Панель спеціаліста</div>
      </div>

      <div class="app-header-right">
        <div class="app-user-box">
          <div class="app-user-name" id="headerUserName"></div>
          <div class="app-user-role"></div>
        </div>
      </div>
    </header>

    <main class="main specialist-main">
      <div class="specialist-card">

        <div class="specialist-top">
          <div id="hello" class="hello-text">Заявки спеціаліста</div>

          <div class="top-actions">
            <button type="button" id="backToOrdersTopBtn" class="btn-outline workspace-back-btn" hidden onclick="closeOrderWorkspace()">← До списку заявок</button>
            <button type="button" class="btn-outline" onclick="handleRefresh()">Оновити</button>
            <button type="button" class="btn-danger-soft" onclick="logout()">Вийти</button>
          </div>
        </div>

        <div class="specialist-filter">
          <select id="statusFilter">
            <option value="">Усі статуси</option>
            <option value="ASSIGNED">Призначена</option>
            <option value="IN_PROGRESS">У роботі</option>
            <option value="INSPECTION">На перевірці</option>
            <option value="WAITING_DETAILS">Очікує деталей</option>
            <option value="EXECUTION">На виконанні</option>
            <option value="REWORK">На переробці</option>
            <option value="DONE">Виконана</option>
            <option value="CANCELED">Скасована</option>
          </select>
        </div>

        <div id="pageStatus" class="status-text">Завантаження...</div>

        <div class="orders-wrapper">
          <div class="orders-header">
            <div>Статус</div>
            <div>Працівник</div>
            <div>Тип заявки</div>
            <div>Опис проблеми</div>
            <div>Локація</div>
            <div>Дата</div>
          </div>

          <div id="orders">
            <div class="empty">Завантаження...</div>
          </div>
        </div>

      </div>
    </main>

    <footer class="site-footer">
      © 2026 Support System
    </footer>
  </div>

<script src="/js/guard.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.7/signalr.min.js"></script>

<script src="/js/js_specialist/specialist-api.js"></script>
<script src="/js/js_specialist/specialist-utils.js"></script>
<script src="/js/js_specialist/specialist-actions.js"></script>
<script src="/js/js_specialist/specialist-render.js"></script>
<script src="/js/js_specialist/specialist-page.js"></script>
<script src="/js/js_specialist/specialist-realtime.js"></script>
</body>
</html>
