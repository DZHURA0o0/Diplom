<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Boss Orders</title>

    <script src="/js/guard.js"></script>
    <script>
        requireRole(["BOSS"]);
    </script>

    <script src="/js/boss-data.js" defer></script>
    <script src="/js/boss-page.js" defer></script>
</head>
<body>

<h1>Orders (Boss)</h1>

<button onclick="logout()">Logout</button>

<br><br>

Status filter:
<select id="statusFilter">
    <option value="">ALL</option>
    <option value="NEW">NEW</option>
    <option value="ASSIGNED">ASSIGNED</option>
    <option value="IN_PROGRESS">IN_PROGRESS</option>
    <option value="INSPECTION">INSPECTION</option>
    <option value="WAITING_DETAILS">WAITING_DETAILS</option>
    <option value="EXECUTION">EXECUTION</option>
    <option value="DONE">DONE</option>
    <option value="CANCELED">CANCELED</option>
</select>

<button onclick="loadOrders()">Reload</button>

<br><br>

<div id="status"></div>

<br>

<table  cellspacing="0" cellpadding="6">
    <thead>
        <tr>
            <th>ID</th>
            <th>Worker</th>
            <th>Specialist</th>
            <th>Status</th>
            <th>Service</th>
            <th>Description</th>
            <th>Location</th>
            <th>Assign specialist</th>
        </tr>
    </thead>
    <tbody id="orders"></tbody>
</table>

</body>
</html>
